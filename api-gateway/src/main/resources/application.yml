server:
  port: 5004

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service-route
              uri: http://auth-service:5006
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1

            - id: customer-service-route
              uri: http://customer-service:5000
              predicates:
                - Path=/api/customers/**
              filters:
                - StripPrefix=1
                - JwtValidation

            - id: api-docs-customer-route
              uri: http://customer-service:5000
              predicates:
                - Path=/api-docs/customers
              filters:
                - RewritePath=/api-docs/customers,/v3/api-docs

            - id: api-docs-auth-route
              uri: http://auth-service:5006
              predicates:
                - Path=/api-docs/auth
              filters:
                - RewritePath=/api-docs/auth,/v3/api-docs